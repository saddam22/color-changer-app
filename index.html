<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Changer App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-100">
<div class="p-8 bg-white rounded-x1 shadow-lg text-center">
<h1 class="text-2x1 font-bold mb-4">Color Change App</h1>

<!-- Display Color -->
<div id="colorBox" class="w-64 h-32 mb-6 rounded-lg border-2 border-gray-300 flex items-center justify-center">
  <span id="colorCode" class="text-lg font-semibold">#ffffff</span>
</div>

<!-- button -->
<button id="randomBtn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded mr-2">Random Color</button>
<button id="copyBtn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded">Copy Color</button>
</div>

  <script src="script.js"></script>
</body>
</html>
